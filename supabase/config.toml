project_id = "snapops"

[auth]
enabled = true
site_url = "https://snapops.app"
additional_redirect_urls = ["https://snapops.app/dashboard", "https://snapops.vercel.app/dashboard", "https://snapops.app/api/auth/callback", "https://snapops.vercel.app/api/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
enable_confirmations = false
